<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}}</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(180deg, #020617, #0f172a); color: #e2e8f0; }
    .layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    aside { background: rgba(15, 23, 42, 0.85); border-right: 1px solid rgba(148, 163, 184, 0.18); padding: 28px 20px; }
    main { padding: 32px; }
    .nav a { display: block; padding: 12px 14px; margin-bottom: 8px; border-radius: 12px; color: #cbd5e1; text-decoration: none; background: rgba(148, 163, 184, 0.08); }
    .nav a.active { background: rgba(37, 99, 235, 0.28); color: #fff; }
    .panel { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
    .badge { display: inline-block; padding: 6px 10px; border-radius: 999px; background: rgba(34, 197, 94, 0.18); color: #86efac; }
    .subtle { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h2>Config Center</h2>
      <p class="subtle">{{.ServiceState}}</p>
      <nav class="nav">
        <a class="active" href="/admin">Overview</a>
        <a href="/admin/configs">Configurations</a>
      </nav>
    </aside>
    <main>
      <section class="panel">
        <span class="badge">Healthy</span>
        <h1>{{.Title}}</h1>
        <p class="subtle">This is the base admin shell for later CRUD, publish, rollback, and cluster views.</p>
      </section>
      <section class="panel">
        <h3>Quick status</h3>
        <ul>
          <li>HTTP entrypoint is ready</li>
          <li>Health check is exposed</li>
          <li>Admin navigation skeleton is in place</li>
        </ul>
      </section>
    </main>
  </div>
</body>
</html>
