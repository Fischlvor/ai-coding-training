<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}}</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(180deg, #f8fafc, #e2e8f0); color: #0f172a; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .hero { display: grid; gap: 16px; margin-bottom: 22px; }
    .card { background: rgba(255,255,255,0.9); border: 1px solid #cbd5e1; border-radius: 18px; padding: 24px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .metric { font-size: 28px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; margin-top: 18px; }
    th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid #e2e8f0; }
    th { color: #475569; font-size: 14px; }
    .leader { color: #166534; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <span>Cluster overview</span>
      <h1>{{.Title}}</h1>
      <p>Node list, leader flag, and basic health indicators for the management console.</p>
    </div>
    <div class="grid">
      <div class="card"><div class="metric">2</div><div>Total nodes</div></div>
      <div class="card"><div class="metric">1</div><div>Leader count</div></div>
      <div class="card"><div class="metric">Healthy</div><div>Cluster state</div></div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h3>Nodes</h3>
      <table>
        <thead>
          <tr><th>Name</th><th>Address</th><th>Role</th><th>Status</th></tr>
        </thead>
        <tbody>
          {{range .Nodes}}
          <tr>
            <td>{{.Name}}</td>
            <td>{{.Address}}</td>
            <td>{{if .Leader}}<span class="leader">Leader</span>{{else}}Follower{{end}}</td>
            <td>{{.State}}</td>
          </tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
