<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}}</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    .shell { min-height: 100vh; display: grid; place-items: center; }
    .card { max-width: 720px; padding: 40px; border-radius: 24px; background: rgba(15, 23, 42, 0.88); border: 1px solid rgba(148, 163, 184, 0.2); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35); }
    .muted { color: #94a3b8; }
    a { color: #60a5fa; text-decoration: none; }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <p class="muted">{{.Title}}</p>
      <h1>Config Center is running</h1>
      <p>Use the health check endpoint to verify the service and open the admin console for the base UI shell.</p>
      <p><a href="/healthz">/healthz</a> · <a href="/admin">/admin</a></p>
    </section>
  </main>
</body>
</html>
